[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: fast, isolated tests (no external services)
    api: tests hitting FastAPI endpoints via TestClient
    regression: tests for specific bugs we fixed (do not delete)
    functional: end-to-end pipeline tests
    slow: tests > 5s (Docling, real LLM calls); skipped in fast suite
    needs_api_key: requires real ANTHROPIC_API_KEY / OPENAI_API_KEY
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
